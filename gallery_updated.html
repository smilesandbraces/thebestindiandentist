<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smiles & Braces Dental Clinic Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
  font-family: 'Open Sans', sans-serif;
  margin: 0;
  background: #f8f9fa;
  color: #333;
}
.header {
  text-align: center;
  padding: 2rem 1rem;
}
.header h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 2.5rem;
  margin: 0;
  color: #5c5c8a;
}
.header p {
  margin: 0.5rem 0;
  font-size: 1rem;
  color: #666;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1rem;
}
.section {
  margin: 2rem 0;
}
.section h2 {
  font-size: 1.8rem;
  margin-bottom: 1rem;
  border-bottom: 1px solid #ddd;
  padding-bottom: 0.5rem;
}


/* Video testimonials */
.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.5rem;
}
.testimonial-item {
  position: relative;
  padding-top: 56.25%;
  background: #000;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  overflow: hidden;
}
.testimonial-item iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
}
.load-more-btn {
  display: block;
  margin: 2rem auto;
  padding: 0.75rem 1.5rem;
  background: #007bff;
  color: #fff;
  border-radius: 5px;
  text-align: center;
  cursor: pointer;
  font-weight: 600;
}
.load-more-btn:hover {
  background: #0056b3;
}

/* Appointment form */
.form-section {
  background: #fff;
  padding: 2rem;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.form-section form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.form-section input, .form-section textarea {
  padding: 0.75rem;
  border-radius: 5px;
  border: 1px solid #ccc;
  font-size: 1rem;
  width: 100%;
}
.form-section button {
  padding: 0.75rem;
  border: none;
  border-radius: 5px;
  background: #007bff;
  color: #fff;
  font-size: 1rem;
  cursor: pointer;
}
.form-section button:hover {
  background: #0056b3;
}

/* Overlay for full-screen view */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.overlay-content {
  position: relative;
  width: 90%;
  max-width: 900px;
}
.overlay-content .close {
  position: absolute;
  top: 10px;
  right: 20px;
  font-size: 2rem;
  color: #fff;
  cursor: pointer;
}
.overlay-slider {
  width: 100%;
  height: 0;
  padding-bottom: 66%;
  position: relative;
}

@media (max-width: 768px) {
  .header h1 { font-size: 2rem; }
  .section h2 { font-size: 1.5rem; }
  .before-after-grid, .testimonials-grid { grid-template-columns: 1fr; }
  .form-section { padding: 1rem; }
}
</style>
</head>
<body>
  <div class="header">
    <h1>Smiles &amp; Braces Dental Clinic</h1>
    <p>Dr. Vikram Jeet Singh &bull; BDS, MDS</p>
<p style="font-size:16px; color:#34C759; margin-top:-5px;">
  <a href="https://www.bestindiandentist.com" style="text-decoration:none; color:#34C759; font-weight:bold;">
    Creating Confident Smiles Everyday
  </a>
</p>
  </div>

  <div class="container">
    <section class="section" id="before-after">
      <h2>Before &amp; After Cases</h2>
      <div class="before-after-grid" id="beforeAfterGrid"></div>
    </section>

    <section class="section" id="testimonials">
      <h2>Patient Video Testimonials</h2>
      <div class="testimonials-grid" id="testimonialGrid"></div>
      <div class="load-more-btn" id="loadMoreBtn">Load More Videos</div>
    </section>

    <section class="section form-section" id="booking">
      <h2>Book an Appointment</h2>
      <form action="https://formspree.io/f/xanpokbz" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="_replyto" placeholder="Your Email" required>
        <input type="tel" name="phone" placeholder="Phone Number" required>
        <textarea name="message" placeholder="How can we help you?" rows="4"></textarea>
        <button type="submit">Book Appointment</button>
      </form>
    </section>
  </div>

  <!-- Full-screen image overlay -->
  <div id="imageOverlay" class="overlay" aria-hidden="true">
    <div class="overlay-content">
      <span class="close" aria-label="Close overlay">&times;</span>
      <div id="overlaySlider"></div>
    </div>
  </div>

<script>

  /* ==========================================
   * 7) VIDEO TESTIMONIALS + LOAD MORE (20/step)
   * ========================================== */
  const videos = [
    '285SdOclAlg','5xB5ZuWO-ag','Snex35Kc254','7p6mT9KzSwE','Kib0e15PcIc',
    'ubTXHzsRdgQ','AXBzHrEA0m8','IbHFxCezwOg','Xq1EN4OxdNg','YGUbxJx0EGE',
    'k24meJzs8bY','tYAnEfBczFE','VZzQ4RAwFOA','nLjdX0papzU','Z2XwBSItTqs',
    'Iof3AFyR_mQ','F8UpLi_p7gw','a8NEjTA86fw','3ad2Xy51KKM','7pwF5WdUY58',
    'tg8CNCv9nZQ','Fc3UZR-2Knw','RQ7cg1NQrxQ','bHGe2oPbYZE','XKfPmPnvMtk',
    'Rtrb3RDZmuk','Ur9VSKARsqw','TaFdApxztw8','U6K0zK8oW5o','Hwyh4S5j6Tg'
  ];
  let videosDisplayed = 0;
  const BATCH = 20;

  function renderVideos() {
    if (!testimonialGrid) return;
    const next = videos.slice(videosDisplayed, videosDisplayed + BATCH);
    next.forEach((id, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'testimonial-item';
      wrap.style.position = 'relative';
      wrap.style.overflow = 'hidden';
      wrap.style.borderRadius = '12px';

      const iframe = document.createElement('iframe');
      iframe.src = 'https://www.youtube.com/embed/' + id;
      iframe.title = 'Patient Testimonial ' + (videosDisplayed + i + 1);
      iframe.allowFullscreen = true;
      iframe.loading = 'lazy';
      iframe.style.width = '100%';
      iframe.style.height = '100%';
      iframe.style.aspectRatio = '16/9';
      iframe.setAttribute('frameborder', '0');
      iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');

      wrap.appendChild(iframe);
      testimonialGrid.appendChild(wrap);
    });

    videosDisplayed += next.length;
    if (loadMoreBtn) {
      loadMoreBtn.style.display = (videosDisplayed >= videos.length) ? 'none' : '';
    }
  }

  renderVideos(); // first 20
  if (loadMoreBtn) {
    loadMoreBtn.addEventListener('click', () => {
      renderVideos();
      loadMoreBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }
});
</script>
</body>
</html>
